<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق - جواهر العطور</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .cart-container {
      max-width: 900px;
      margin: 40px auto;
      background: rgba(255,255,245,0.1);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 30px;
      border: 1px solid rgba(212,175,55,0.2);
    }
    .cart-container h2 { color: #fadc9f; text-align: center; margin-bottom: 25px; }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(255,255,255,0.05); padding: 15px; border-radius: 30px;
      margin: 10px 0; flex-wrap: wrap; gap: 10px;
    }
    .cart-item .item-info { flex: 1; }
    .cart-item .item-info h3 { color: #fadc9f; font-size: 1.1rem; }
    .cart-item .item-info .price { color: #f7c56e; font-weight: bold; }
    .cart-item .qty-controls { display: flex; align-items: center; gap: 10px; }
    .cart-item .qty-controls button {
      background: #d4af37; border: none; padding: 5px 12px; border-radius: 30px;
      cursor: pointer; font-weight: bold; color: #1a1125;
    }
    .cart-item .remove-btn {
      background: #c62828; color: white; border: none; padding: 5px 12px;
      border-radius: 30px; cursor: pointer;
    }
    .cart-total {
      text-align: left; font-size: 1.4rem; margin-top: 20px;
      padding: 15px; background: rgba(0,0,0,0.3); border-radius: 30px;
    }
    .cart-total .total-price { color: #f7c56e; font-weight: bold; }
    .checkout-btn {
      display: inline-block; background: #d4af37; color: #1a1125;
      padding: 12px 30px; border-radius: 40px; text-decoration: none;
      font-weight: bold; margin-top: 20px;
    }
    .empty-cart { text-align: center; padding: 40px; color: #aaa; }
    .empty-cart a { color: #d4af37; text-decoration: none; }
    body.style-classic .cart-container { background: rgba(255,250,245,0.9); }
    body.style-classic .cart-item { background: rgba(0,0,0,0.05); }
    body.style-classic .cart-item .item-info h3 { color: #1a1a1a; }
    body.style-classic .cart-total { background: rgba(0,0,0,0.05); }
    body.style-modern .cart-container { background: rgba(30,30,30,0.85); border-color: #555; }
    @media (max-width: 700px) { .cart-container { padding: 20px; } }
  </style>
</head>
<body>

<header class="main-header">
  <div class="logo"><i class="fas fa-crown"></i> جواهر العطور</div>
  <nav>
    <a href="index.html">الرئيسية</a>
    <a href="cart.html" class="active">سلة التسوق 🛒</a>
  </nav>

<div class="cart-container">
  <h2>🛒 سلة التسوق</h2>
  <div id="cartItemsList"></div>
  <div id="cartTotal" class="cart-total"></div>
  <div style="text-align: left;">
    <a href="checkout.html" id="checkoutBtn" class="checkout-btn" style="display: none;">إتمام الشراء</a>
  </div>
</div>
